services:
  mcp-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-gateway
    ports:
      - "4298:4298"
    volumes:
      - ./config/servers.example.json:/app/config.json:ro
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4298/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
