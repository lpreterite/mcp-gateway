name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.21'

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    outputs:
      release_name: ${{ steps.prepare.outputs.release_name }}
      release_notes: ${{ steps.prepare.outputs.release_notes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Determine version
        id: prepare
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version_string=$VERSION" >> $GITHUB_OUTPUT
          echo "release_name=Release $VERSION" >> $GITHUB_OUTPUT
          echo "release_notes=$(git log --pretty=format:'%s' $(git describe --tags --abbrev=0)..HEAD | head -20 | sed 's/"/\\"/g')" >> $GITHUB_OUTPUT

      - name: Create commit range notes
        id: changelog
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "notes=${{ steps.prepare.outputs.release_notes }}" >> $GITHUB_OUTPUT
          else
            LAST_TAG=$(git describe --tags --abbrev=0)
            NOTES=$(git log --pretty=format:'* %s (%h)' ${LAST_TAG}..HEAD | head -30)
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "$NOTES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        run: go test -v -race ./...

      - name: Build cross-platform binaries
        run: |
          mkdir -p release

          echo "Building for linux/amd64..."
          GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=${{ steps.prepare.outputs.version_string }}" -o release/mcp-gateway-linux-amd64 ./cmd/gateway

          echo "Building for linux/arm64..."
          GOOS=linux GOARCH=arm64 go build -ldflags "-X main.version=${{ steps.prepare.outputs.version_string }}" -o release/mcp-gateway-linux-arm64 ./cmd/gateway

          echo "Building for darwin/amd64..."
          GOOS=darwin GOARCH=amd64 go build -ldflags "-X main.version=${{ steps.prepare.outputs.version_string }}" -o release/mcp-gateway-darwin-amd64 ./cmd/gateway

          echo "Building for darwin/arm64..."
          GOOS=darwin GOARCH=arm64 go build -ldflags "-X main.version=${{ steps.prepare.outputs.version_string }}" -o release/mcp-gateway-darwin-arm64 ./cmd/gateway

          echo "Building for windows/amd64..."
          GOOS=windows GOARCH=amd64 go build -ldflags "-X main.version=${{ steps.prepare.outputs.version_string }}" -o release/mcp-gateway-windows-amd64.exe ./cmd/gateway

          echo "Build complete!"
          ls -la release/

      - name: Calculate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          name: ${{ steps.prepare.outputs.release_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Release was prepared. Please use the GitHub UI to publish the release."
          echo "Artifacts are in the 'release' directory."

  homebrew:
    name: Homebrew Tap Update
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.repository == 'lpreterite/mcp-gateway'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Homebrew formula
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "Creating formula for version ${VERSION}"

          mkdir -p Formula

          curl -sL https://github.com/lpreterite/mcp-gateway/releases/download/${VERSION}/mcp-gateway-darwin-arm64 -o mcp-gateway-darwin-arm64
          SHA256_DARWIN_ARM64=$(sha256sum mcp-gateway-darwin-arm64 | awk '{print $1}')

          curl -sL https://github.com/lpreterite/mcp-gateway/releases/download/${VERSION}/mcp-gateway-darwin-amd64 -o mcp-gateway-darwin-amd64
          SHA256_DARWIN_AMD64=$(sha256sum mcp-gateway-darwin-amd64 | awk '{print $1}')

          curl -sL https://github.com/lpreterite/mcp-gateway/releases/download/${VERSION}/mcp-gateway-linux-amd64 -o mcp-gateway-linux-amd64
          SHA256_LINUX_AMD64=$(sha256sum mcp-gateway-linux-amd64 | awk '{print $1}')

          curl -sL https://github.com/lpreterite/mcp-gateway/releases/download/${VERSION}/mcp-gateway-linux-arm64 -o mcp-gateway-linux-arm64
          SHA256_LINUX_ARM64=$(sha256sum mcp-gateway-linux-arm64 | awk '{print $1}')

          curl -sL https://github.com/lpreterite/mcp-gateway/releases/download/${VERSION}/mcp-gateway-windows-amd64.exe -o mcp-gateway-windows-amd64.exe
          SHA256_WINDOWS_AMD64=$(sha256sum mcp-gateway-windows-amd64.exe | awk '{print $1}')

          cat > Formula/mcp-gateway.rb << 'RUBY_EOF'
          class McpGateway < Formula
            desc "MCP 统一网关 - 连接多个 MCP 服务器的统一网关"
            homepage "https://github.com/lpreterite/mcp-gateway"
            version "#{VERSION}"
            sha256 "#{SHA256_DARWIN_ARM64}"

            depends_on "go" => :build

            if OS.mac?
              if Hardware::CPU.arm?
                url "https://github.com/lpreterite/mcp-gateway/releases/download/#{VERSION}/mcp-gateway-darwin-arm64"
                sha256 "#{SHA256_DARWIN_ARM64}"
              else
                url "https://github.com/lpreterite/mcp-gateway/releases/download/#{VERSION}/mcp-gateway-darwin-amd64"
                sha256 "#{SHA256_DARWIN_AMD64}"
              end
            end

            if OS.linux?
              if Hardware::CPU.arm?
                url "https://github.com/lpreterite/mcp-gateway/releases/download/#{VERSION}/mcp-gateway-linux-arm64"
                sha256 "#{SHA256_LINUX_ARM64}"
              else
                url "https://github.com/lpreterite/mcp-gateway/releases/download/#{VERSION}/mcp-gateway-linux-amd64"
                sha256 "#{SHA256_LINUX_AMD64}"
              end
            end

            def install
              bin.install "mcp-gateway"
            end

            test do
              system "#{bin}/mcp-gateway", "--version"
            end
          end
          RUBY_EOF

          echo "Formula created successfully"
          cat Formula/mcp-gateway.rb

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: lpreterite/homebrew-tap
          token: ${{ secrets.GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update formula in tap
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"

          mkdir -p homebrew-tap/Formula
          cp Formula/mcp-gateway.rb homebrew-tap/Formula/mcp-gateway.rb

          cd homebrew-tap

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Formula/mcp-gateway.rb
          git commit -m "Update mcp-gateway to ${VERSION}"
          git push origin main

          echo "Formula updated successfully in homebrew-tap"
